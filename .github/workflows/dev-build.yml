name: Development Build

# This workflow handles development builds with intelligent build skipping:
# - Feature branches: Build artifacts, no releases (testing only)  
# - Develop branch: Build artifacts + create development releases (when meaningful changes are merged)
# - Main/Master branch: ALWAYS build + create production releases (releases require fresh artifacts)
#
# Smart merge detection prevents redundant builds by:
# - Main/Master: Always builds (never skip releases!)
# - Detecting merge commits vs regular commits
# - For merges: Analyzing actual changes being merged (not just the merge commit)
# - For regular commits: Comparing against previous commit
# - Skipping builds when only documentation/config files changed (.md, .txt, .yml, .yaml, .github/)
# - Respecting [skip ci] or [ci skip] in commit messages (except on main/master)
#
# This ensures develop/main branches BUILD when feature branches are merged (as they should!)
# while still preventing redundant builds when no meaningful code changes exist.

on:
  push:
    branches: 
      - develop
      - dev
      - main
      - master
      - 'feature/**'
      - 'feat/**'
      - 'fix/**'
      - 'codex/**'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read

env:
  QT_VERSION: '6.8.3'
  QT_VERSION_MACOS: '6.11.1'
  VIBERTEMIS_BUILD_COMMIT: ${{ github.sha }}
  VIBERTEMIS_UPDATE_CHANNEL: >-
    ${{ github.repository == 'samelamin/vibertemis' &&
        github.ref == 'refs/heads/main' && 'stable' || 'none' }}
  VIBERTEMIS_BUILD_SEQUENCE: 0
  VIBERTEMIS_APPLICATION_ID: com.artemis_desktop.Artemis

jobs:
  setup-version:
    name: Setup Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      numeric_version: ${{ steps.version.outputs.numeric_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      should_build: ${{ steps.check-changes.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for proper versioning
      
      - name: Check for meaningful changes
        id: check-changes
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Always build on main/master branch (releases)
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "master" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Always building on main/master branch for release"
            exit 0
          fi
          
          # Skip builds if commit message contains [skip ci] or [ci skip]
          if echo "$HEAD_COMMIT_MESSAGE" | grep -E "\[(skip ci|ci skip)\]" > /dev/null; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Build skipped due to [skip ci] in commit message"
            exit 0
          fi
          
          # Check if this is a merge commit (has multiple parents)
          PARENT_COUNT=$(git rev-list --parents -n 1 HEAD | wc -w)
          PARENT_COUNT=$((PARENT_COUNT - 1))  # Subtract 1 because first item is the commit hash itself
          
          if [ "$PARENT_COUNT" -gt 1 ]; then
            echo "Detected merge commit with $PARENT_COUNT parents"
            
            # For merge commits, check the actual changes being merged
            # Compare against the first parent (the target branch before merge)
            FIRST_PARENT=$(git rev-parse HEAD^1)
            echo "Comparing changes against first parent: $FIRST_PARENT"
            
            # Get all changed files in this merge, excluding documentation/config files but allowing workflow changes
            CHANGED_FILES=$(git diff --name-only "$FIRST_PARENT" HEAD | awk '!/(\.md$|test.*\.txt$|README.*\.txt$|CHANGELOG.*\.txt$|\.(yml|yaml)$)/ { count++ } END { print count + 0 }')
            WORKFLOW_FILES=$(git diff --name-only "$FIRST_PARENT" HEAD | awk '/^\.github\/workflows\/.*\.(yml|yaml)$/ { count++ } END { print count + 0 }')
            TOTAL_MEANINGFUL=$((CHANGED_FILES + WORKFLOW_FILES))
            echo "Meaningful files changed in merge: $CHANGED_FILES"
            echo "Workflow files changed: $WORKFLOW_FILES"
            echo "Total meaningful changes: $TOTAL_MEANINGFUL"
            
            if [ "$TOTAL_MEANINGFUL" -eq 0 ]; then
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "Skipping build - merge contains no meaningful code changes"
              exit 0
            else
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "Build will proceed - merge contains $TOTAL_MEANINGFUL meaningful changes (code: $CHANGED_FILES, workflows: $WORKFLOW_FILES)"
              exit 0
            fi
          else
            echo "Regular commit (not a merge) - checking for meaningful changes"
            
            # For regular commits, check against previous commit
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | awk '!/(\.md$|test.*\.txt$|README.*\.txt$|CHANGELOG.*\.txt$|\.(yml|yaml)$)/ { count++ } END { print count + 0 }')
            WORKFLOW_FILES=$(git diff --name-only HEAD~1 HEAD | awk '/^\.github\/workflows\/.*\.(yml|yaml)$/ { count++ } END { print count + 0 }')
            TOTAL_MEANINGFUL=$((CHANGED_FILES + WORKFLOW_FILES))
            echo "Meaningful files changed: $CHANGED_FILES"
            echo "Workflow files changed: $WORKFLOW_FILES" 
            echo "Total meaningful changes: $TOTAL_MEANINGFUL"
            
            if [ "$TOTAL_MEANINGFUL" -eq 0 ]; then
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "Skipping build - no meaningful code changes detected"
              exit 0
            fi
          fi
          
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "Build will proceed - meaningful changes detected (including code and/or workflow changes)"
      
      - name: Generate semantic version
        id: version
        run: |
          # Base version from app/version.txt
          BASE_VERSION=$(cat app/version.txt | tr -d '\n\r')
          
          # Get branch info
          BRANCH_NAME="${{ github.ref_name }}"
          BRANCH_SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          
          # Get commit info
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:7}"
          
          # Get timestamp info
          TIMESTAMP=$(date +"%Y%m%d")
          BUILD_NUMBER=$(date +"%H%M")
          
          # Determine if this is a prerelease
          IS_PRERELEASE="true"
          PRERELEASE_SUFFIX=""
          
          if [[ "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "master" ]]; then
            # Main branch = stable release
            VERSION="$BASE_VERSION"
            IS_PRERELEASE="false"
          elif [[ "$BRANCH_NAME" == "develop" ]]; then
            # Develop branch = development prerelease
            VERSION="$BASE_VERSION-dev.$TIMESTAMP.$BUILD_NUMBER+$COMMIT_SHORT"
            PRERELEASE_SUFFIX="dev"
          elif [[ "$BRANCH_NAME" =~ ^(feature|feat)/ ]]; then
            # Feature branch = feature prerelease
            FEATURE_NAME=$(echo "$BRANCH_NAME" | sed 's|^.*/||' | sed 's/[^a-zA-Z0-9._-]/-/g')
            VERSION="$BASE_VERSION-feature.$FEATURE_NAME.$TIMESTAMP.$BUILD_NUMBER+$COMMIT_SHORT"
            PRERELEASE_SUFFIX="feature"
          elif [[ "$BRANCH_NAME" =~ ^(hotfix|fix)/ ]]; then
            # Hotfix branch = hotfix prerelease
            VERSION="$BASE_VERSION-hotfix.$TIMESTAMP.$BUILD_NUMBER+$COMMIT_SHORT"
            PRERELEASE_SUFFIX="hotfix"
          else
            # Other branches = alpha prerelease
            VERSION="$BASE_VERSION-alpha.$BRANCH_SANITIZED.$TIMESTAMP.$BUILD_NUMBER+$COMMIT_SHORT"
            PRERELEASE_SUFFIX="alpha"
          fi
          
          # Create numeric version for Windows RC files (extract major.minor.patch + build number)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NUMERIC_VERSION="$MAJOR.$MINOR.$PATCH.$BUILD_NUMBER"
          
          # Output all versions
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "numeric_version=$NUMERIC_VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          
          echo "Generated versions:"
          echo "  Semantic Version: $VERSION"
          echo "  Numeric Version: $NUMERIC_VERSION"
          echo "  Is Prerelease: $IS_PRERELEASE"
          echo "  Branch: $BRANCH_NAME"

  compile-sanity:
    name: Compile Sanity (macOS + Linux)
    needs: setup-version
    if: needs.setup-version.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          # Qt 6.11.1 contains the QTBUG-145239 fix required by the macOS 26 SDK.
          version: ${{ matrix.os == 'macos-latest' && env.QT_VERSION_MACOS || env.QT_VERSION }}
          host: ${{ matrix.os == 'macos-latest' && 'mac' || 'linux' }}
          target: 'desktop'
          modules: 'qtmultimedia'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libegl1-mesa-dev libgl1-mesa-dev \
            libopus-dev libsdl2-dev libsdl2-ttf-dev \
            libssl-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libxkbcommon-dev wayland-protocols libdrm-dev libgbm-dev \
            libplacebo-dev libdbus-1-dev

      - name: Build (qmake + make)
        run: |
          export PATH="$Qt6_DIR/bin:$PATH"
          qmake6 artemis.pro CONFIG+=release "QMAKE_CXXFLAGS+=-fPIC"
          make -j$(/usr/bin/env bash -lc 'command -v sysctl >/dev/null 2>&1 && sysctl -n hw.ncpu || nproc')

      - name: Build and run updater tests
        run: |
          export PATH="$Qt6_DIR/bin:$PATH"
          mkdir -p build/tests-autoupdate
          cd build/tests-autoupdate
          qmake6 ../../tests/autoupdate/autoupdate.pro
          make -j"$(sysctl -n hw.logicalcpu 2>/dev/null || nproc)"
          QT_QPA_PLATFORM=offscreen ./tst_autoupdate
  build-windows-x64-portable:
    name: Windows x64 Portable Build
    needs: setup-version
    runs-on: windows-latest
    if: needs.setup-version.outputs.should_build == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0  # Needed for version info
    
    - name: Display version info
      run: |
        echo "Using semantic version: ${{ needs.setup-version.outputs.version }}"
        echo "Using numeric version: ${{ needs.setup-version.outputs.numeric_version }}"
        echo "Is prerelease: ${{ needs.setup-version.outputs.is_prerelease }}"
    
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
      continue-on-error: true
      id: qt_install_primary
    
    - name: Retry Qt Installation (if failed)
      if: steps.qt_install_primary.outcome == 'failure'
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Update version file for development build
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
        NUMERIC_VERSION: ${{ needs.setup-version.outputs.numeric_version }}
      run: |
        # Write numeric version for Windows RC compilation
        echo $env:NUMERIC_VERSION > app\version.txt
    
    - name: Build portable package only
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        # Add Qt to PATH for the build script
        $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
        
        # Build the executable first so its stamped identity can be verified.
        cmd /c "scripts\build-artemis-arch.bat release build-only"
        
        if ($LASTEXITCODE -ne 0) {
          echo "Build failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }

    - name: Verify x64 native build identity
      shell: pwsh
      run: |
        $binary = "build\build-x64-release\app\release\Artemis.exe"
        $buildInfo = (& $binary --build-info | ConvertFrom-Json)
        if ($LASTEXITCODE -ne 0) { throw "$binary --build-info failed" }
        $expectedVersion = (Get-Content app\version.txt -Raw).Trim()
        if ($buildInfo.schema -ne 1 -or
            $buildInfo.applicationId -ne $env:VIBERTEMIS_APPLICATION_ID -or
            $buildInfo.commit -ne $env:VIBERTEMIS_BUILD_COMMIT -or
            $buildInfo.channel -ne $env:VIBERTEMIS_UPDATE_CHANNEL -or
            [string]$buildInfo.sequence -ne "0" -or
            $buildInfo.version -ne $expectedVersion -or
            $buildInfo.internallyConsistent -ne $true) {
          throw "Unexpected x64 build identity: $($buildInfo | ConvertTo-Json -Compress)"
        }

    - name: Package verified x64 executable
      run: |
        $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
        cmd /c "scripts\build-artemis-arch.bat release package-only"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    
    - name: Rename portable ZIP
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        # Find the generated portable ZIP file
        $zipFile = Get-ChildItem -Path "build\installer-x64-release" -Filter "ArtemisPortable-*.zip" | Select-Object -First 1
        
        if ($zipFile) {
          # Rename the portable ZIP for public Vibertemis distribution
          $newZipName = "vibertemis-windows-x64-portable-$env:SEMANTIC_VERSION.zip"
          Move-Item $zipFile.FullName $newZipName
          echo "Created x64 portable ZIP: $newZipName"
        } else {
          echo "ERROR: Portable ZIP not found"
          Get-ChildItem -Path "build\installer-x64-release" -Recurse
          exit 1
        }
    
    - name: Upload x64 Portable ZIP
      uses: actions/upload-artifact@v4
      with:
        name: vibertemis-windows-x64-portable-${{ needs.setup-version.outputs.version }}
        path: vibertemis-windows-x64-portable-${{ needs.setup-version.outputs.version }}.zip
        retention-days: 30
        if-no-files-found: warn

  build-windows-arm64-portable:
    name: Windows ARM64 Portable Build
    needs: setup-version
    runs-on: windows-11-arm
    if: needs.setup-version.outputs.should_build == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0  # Needed for version info
    
    - name: Display version info
      run: |
        echo "Using semantic version: ${{ needs.setup-version.outputs.version }}"
        echo "Using numeric version: ${{ needs.setup-version.outputs.numeric_version }}"
        echo "Is prerelease: ${{ needs.setup-version.outputs.is_prerelease }}"
    
    - name: Setup native Qt for ARM64
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows_arm64'
        target: 'desktop'
        arch: 'win64_msvc2022_arm64'
        modules: 'qtmultimedia'
      continue-on-error: true
      id: qt_install_arm64

    - name: Retry Qt ARM64 Installation (if failed)
      if: steps.qt_install_arm64.outcome == 'failure'
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows_arm64'
        target: 'desktop'
        arch: 'win64_msvc2022_arm64'
        modules: 'qtmultimedia'
    
    - name: Setup MSVC for ARM64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: arm64
        
    - name: Verify MSVC ARM64 Setup
      run: |
        echo "MSVC Environment Variables:"
        echo "VSCMD_ARG_TGT_ARCH: $env:VSCMD_ARG_TGT_ARCH"
        echo "VSCMD_ARG_HOST_ARCH: $env:VSCMD_ARG_HOST_ARCH"
        echo "Platform: $env:Platform"
        echo "LIB: $($env:LIB -split ';' | Select-Object -First 3)"
        echo "INCLUDE: $($env:INCLUDE -split ';' | Select-Object -First 3)"
    
    - name: Update version file for development build
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
        NUMERIC_VERSION: ${{ needs.setup-version.outputs.numeric_version }}
      run: |
        # Write numeric version for Windows RC compilation
        echo $env:NUMERIC_VERSION > app\version.txt
    
    - name: Build ARM64 portable package only
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        # Find and set up Qt ARM64 environment
        echo "Setting up Qt ARM64 environment..."
        $qtVersionRoot = Join-Path $env:RUNNER_WORKSPACE "Qt\$env:QT_VERSION"
        $qtArm64Path = Join-Path $qtVersionRoot "msvc2022_arm64"
        
        if (-not (Test-Path $qtArm64Path)) {
          echo "ERROR: Qt ARM64 not found at expected path: $qtArm64Path"
          echo "Available Qt installations:"
          Get-ChildItem $qtVersionRoot -ErrorAction SilentlyContinue | Select-Object Name
          exit 1
        }
        
        # Set Qt environment
        $env:Qt6_DIR = $qtArm64Path
        $env:PATH = "$qtArm64Path\bin;$env:PATH"
        
        echo "Qt ARM64 setup complete:"
        echo "  Qt6_DIR: $env:Qt6_DIR"
        echo "  qmake available: $(Test-Path "$qtArm64Path\bin\qmake.bat")"
        
        # Run the build script
        echo "Running build script for ARM64..."
        cmd /c "scripts\build-artemis-arch.bat release build-only"
        
        $buildExitCode = $LASTEXITCODE
        echo "Build script completed with exit code: $buildExitCode"
        
        if ($buildExitCode -ne 0) {
          echo "ERROR: Build script failed with exit code $buildExitCode"
          exit $buildExitCode
        }

    - name: Verify ARM64 native build identity
      shell: pwsh
      run: |
        $binary = "build\build-arm64-release\app\release\Artemis.exe"
        $buildInfo = (& $binary --build-info | ConvertFrom-Json)
        if ($LASTEXITCODE -ne 0) { throw "$binary --build-info failed" }
        $expectedVersion = (Get-Content app\version.txt -Raw).Trim()
        if ($buildInfo.schema -ne 1 -or
            $buildInfo.applicationId -ne $env:VIBERTEMIS_APPLICATION_ID -or
            $buildInfo.commit -ne $env:VIBERTEMIS_BUILD_COMMIT -or
            $buildInfo.channel -ne $env:VIBERTEMIS_UPDATE_CHANNEL -or
            [string]$buildInfo.sequence -ne "0" -or
            $buildInfo.version -ne $expectedVersion -or
            $buildInfo.internallyConsistent -ne $true) {
          throw "Unexpected ARM64 build identity: $($buildInfo | ConvertTo-Json -Compress)"
        }

    - name: Package verified ARM64 executable
      run: |
        $qtVersionRoot = Join-Path $env:RUNNER_WORKSPACE "Qt\$env:QT_VERSION"
        $qtArm64Path = Join-Path $qtVersionRoot "msvc2022_arm64"
        $env:Qt6_DIR = $qtArm64Path
        $env:PATH = "$qtArm64Path\bin;$env:PATH"
        cmd /c "scripts\build-artemis-arch.bat release package-only"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    
    - name: Rename ARM64 portable ZIP
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        # Find the generated portable ZIP file
        $zipFile = Get-ChildItem -Path "build\installer-arm64-release" -Filter "ArtemisPortable-*.zip" | Select-Object -First 1
        
        if ($zipFile) {
          # Rename the portable ZIP for public Vibertemis distribution
          $newZipName = "vibertemis-windows-arm64-portable-$env:SEMANTIC_VERSION.zip"
          Move-Item $zipFile.FullName $newZipName
          echo "Created ARM64 portable ZIP: $newZipName"
        } else {
          echo "ERROR: ARM64 Portable ZIP not found"
          Get-ChildItem -Path "build\installer-arm64-release" -Recurse
          exit 1
        }
    
    - name: Upload ARM64 Portable ZIP
      uses: actions/upload-artifact@v4
      with:
        name: vibertemis-windows-arm64-portable-${{ needs.setup-version.outputs.version }}
        path: vibertemis-windows-arm64-portable-${{ needs.setup-version.outputs.version }}.zip
        retention-days: 30
        if-no-files-found: warn

  build-windows-msi-components:
    name: Windows ${{ matrix.architecture }} MSI Component
    needs: setup-version
    if: needs.setup-version.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        architecture: [x64, arm64]
    runs-on: ${{ matrix.architecture == 'arm64' && 'windows-11-arm' || 'windows-latest' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Setup Qt for x64
      if: matrix.architecture == 'x64'
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
      continue-on-error: true
      id: qt_install_msi_x64

    - name: Retry x64 Qt Installation (if failed)
      if: matrix.architecture == 'x64' && steps.qt_install_msi_x64.outcome == 'failure'
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'

    - name: Setup native Qt for ARM64
      if: matrix.architecture == 'arm64'
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows_arm64'
        target: 'desktop'
        arch: 'win64_msvc2022_arm64'
        modules: 'qtmultimedia'
      continue-on-error: true
      id: qt_install_msi_arm64

    - name: Retry ARM64 Qt Installation (if failed)
      if: matrix.architecture == 'arm64' && steps.qt_install_msi_arm64.outcome == 'failure'
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows_arm64'
        target: 'desktop'
        arch: 'win64_msvc2022_arm64'
        modules: 'qtmultimedia'

    - name: Setup native MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.architecture == 'arm64' && 'arm64' || 'x64' }}

    - name: Update version file
      shell: pwsh
      env:
        NUMERIC_VERSION: ${{ needs.setup-version.outputs.numeric_version }}
      run: echo $env:NUMERIC_VERSION > app\version.txt

    - name: Build MSI component executable
      shell: pwsh
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
        cmd /c "scripts\build-artemis-arch.bat release build-only"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Verify MSI component identity
      shell: pwsh
      env:
        TARGET_ARCH: ${{ matrix.architecture }}
      run: |
        if ($env:TARGET_ARCH -eq "arm64") {
          $binary = "build\build-arm64-release\app\release\Artemis.exe"
        } else {
          $binary = "build\build-x64-release\app\release\Artemis.exe"
        }
        $buildInfo = (& $binary --build-info | ConvertFrom-Json)
        if ($LASTEXITCODE -ne 0) { throw "$binary --build-info failed" }
        $expectedVersion = (Get-Content app\version.txt -Raw).Trim()
        if ($buildInfo.schema -ne 1 -or
            $buildInfo.applicationId -ne $env:VIBERTEMIS_APPLICATION_ID -or
            $buildInfo.commit -ne $env:VIBERTEMIS_BUILD_COMMIT -or
            $buildInfo.channel -ne $env:VIBERTEMIS_UPDATE_CHANNEL -or
            [string]$buildInfo.sequence -ne "0" -or
            $buildInfo.version -ne $expectedVersion -or
            $buildInfo.internallyConsistent -ne $true) {
          throw "Unexpected $env:TARGET_ARCH MSI build identity: $($buildInfo | ConvertTo-Json -Compress)"
        }

    - name: Package verified MSI component
      shell: pwsh
      env:
        TARGET_ARCH: ${{ matrix.architecture }}
      run: |
        $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
        cmd /c "scripts\build-artemis-arch.bat release package-only"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

        if ($env:TARGET_ARCH -eq "arm64") {
          $installerDirectory = "build\installer-arm64-release"
          $handoffDirectory = "build\build-arm64-release"
        } else {
          $installerDirectory = "build\installer-x64-release"
          $handoffDirectory = "build\build-x64-release"
        }
        $msiFile = Get-ChildItem -Path $installerDirectory -Filter "*.msi" |
          Select-Object -First 1
        if (-not $msiFile) {
          throw "$env:TARGET_ARCH MSI not found in $installerDirectory"
        }
        Copy-Item $msiFile.FullName "$handoffDirectory\Artemis.msi" -Force

    - name: Upload verified MSI component
      uses: actions/upload-artifact@v4
      with:
        name: vibertemis-windows-msi-${{ matrix.architecture }}-${{ needs.setup-version.outputs.version }}
        path: build/build-${{ matrix.architecture }}-release/Artemis.msi
        retention-days: 1
        if-no-files-found: error

  build-windows-universal-installer:
    name: Windows Universal Installer
    needs: [setup-version, build-windows-msi-components]
    runs-on: windows-latest
    if: needs.setup-version.outputs.should_build == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Download verified x64 MSI component
      uses: actions/download-artifact@v4
      with:
        name: vibertemis-windows-msi-x64-${{ needs.setup-version.outputs.version }}
        path: build/build-x64-release

    - name: Download verified ARM64 MSI component
      uses: actions/download-artifact@v4
      with:
        name: vibertemis-windows-msi-arm64-${{ needs.setup-version.outputs.version }}
        path: build/build-arm64-release

    - name: Setup build environment
      run: |
        # Install .NET SDK first (required for WiX v5)
        choco install dotnet-sdk -y
        
        # Install WiX Toolset v5 as a .NET tool (recommended approach for v5)
        dotnet tool install --global wix --version 5.0.1
        
        # Verify installation
        wix --version
        
        # Also install Visual Studio Build Tools (includes MSBuild) for compatibility
        choco install visualstudio2022buildtools --package-parameters "--includeRecommended --includeOptional --quiet --wait" -y
    
    - name: Generate Universal Bundle  
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
        NUMERIC_VERSION: ${{ needs.setup-version.outputs.numeric_version }}
      run: |
        # Prefer a purely numeric version for MSBuild/NuGet and WiX
        $msbuildVersion = $env:NUMERIC_VERSION
        if ([string]::IsNullOrWhiteSpace($msbuildVersion)) {
          # Fallback: extract up to 4 numeric segments from semantic version
          $match = [regex]::Match($env:SEMANTIC_VERSION, '\d+(?:\.\d+){2,3}')
          if ($match.Success) { $msbuildVersion = $match.Value } else { $msbuildVersion = '0.0.0.0' }
        }
        
        echo "Original semantic version: $env:SEMANTIC_VERSION"
        echo "MSBuild/WiX version: $msbuildVersion"
        
        # Update version file with MSBuild-compatible version
        echo $msbuildVersion > app\version.txt
        
        # Set environment variables that the WiX scripts expect
        $env:BUILD_CONFIG = "release"
        $env:BUILD_ROOT = $PWD
        
        # Restore and build with explicit version properties for WiX v5
        dotnet restore wix\ArtemisSetup\ArtemisSetup.wixproj
        
        $buildCmd = "dotnet build wix\ArtemisSetup\ArtemisSetup.wixproj --configuration Release --no-restore"
        $buildCmd += " -p:INSTALLER_FOLDER=build\installer-release"
        $buildCmd += " -p:BUILD_FOLDER=build\build-release"
        $buildCmd += " -p:BUILD_ROOT=$env:BUILD_ROOT"
        $buildCmd += " -p:Version=$msbuildVersion -p:WixVersion=$msbuildVersion -p:WixBundleVersion=$msbuildVersion"
        
        Write-Host "Running: $buildCmd"
        cmd /c $buildCmd
        
        if ($LASTEXITCODE -ne 0) {
          echo "Bundle generation failed with exit code $LASTEXITCODE"
          echo "Trying fallback approach with generate-artemis-bundle.bat script..."
          
          # Fallback to original script approach with version override
          cmd /c "scripts\generate-artemis-bundle.bat release $msbuildVersion"
          
          if ($LASTEXITCODE -ne 0) {
            echo "Fallback also failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
        }
    
    - name: Rename universal bundle
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        # Find the generated bundle
        $bundleFile = Get-ChildItem -Path "build\installer-release" -Filter "ArtemisSetup*.exe" | Select-Object -First 1
        
        if ($bundleFile) {
          # Rename universal bundle
          $newBundleName = "vibertemis-windows-universal-installer-$env:SEMANTIC_VERSION.exe"
          Move-Item $bundleFile.FullName $newBundleName
          echo "Created universal installer: $newBundleName"
        } else {
          echo "ERROR: Universal bundle not found"
          Get-ChildItem -Path "build\installer-release" -Recurse
          exit 1
        }
    
    - name: Upload Universal Installer
      uses: actions/upload-artifact@v4
      with:
        name: vibertemis-windows-universal-installer-${{ needs.setup-version.outputs.version }}
        path: vibertemis-windows-universal-installer-${{ needs.setup-version.outputs.version }}.exe
        retention-days: 30
        if-no-files-found: warn

  build-macos-dev:
    name: macOS Development Build
    needs: setup-version
    runs-on: macos-latest
    if: needs.setup-version.outputs.should_build == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Display version info
      run: |
        echo "Using semantic version: ${{ needs.setup-version.outputs.version }}"
        echo "Using numeric version: ${{ needs.setup-version.outputs.numeric_version }}"
        echo "Is prerelease: ${{ needs.setup-version.outputs.is_prerelease }}"

    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION_MACOS }}
        host: 'mac'
        target: 'desktop'
        modules: 'qtmultimedia'

    - name: Set macOS deployment target for compatibility
      run: |
        echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV
        echo "Qt6_DIR=$Qt6_DIR" >> $GITHUB_ENV

    - name: Display macOS toolchain info
      run: |
        export PATH="$Qt6_DIR/bin:$PATH"
        echo "Runner image: ${ImageOS:-unknown} ${ImageVersion:-unknown}"
        sw_vers
        echo "SDK: $(xcrun --show-sdk-version)"
        clang --version
        qmake6 -v
        echo "Architecture: $(uname -m)"

    - name: Install dependencies
      run: |
        brew install create-dmg ffmpeg opus sdl2 sdl2_ttf

    - name: Test macOS refresh rate support
      run: |
        export PATH="$Qt6_DIR/bin:$PATH"
        mkdir -p build/tests-refreshrate
        cd build/tests-refreshrate
        qmake6 ../../tests/refreshrate/refreshrate.pro
        make -j"$(sysctl -n hw.logicalcpu)"
        ./tst_refreshrate

    - name: Build macOS executable
      env:
        VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        export PATH="$Qt6_DIR/bin:$PATH"
        echo "::warning::This macOS development build is unsigned and may trigger Gatekeeper warnings."
        ARTEMIS_MAC_ARCHS="$(uname -m)" \
          ./scripts/generate-dmg.sh Release "$VERSION" build-only

    - name: Verify macOS executable identity before packaging
      run: |
        build/build-Release/app/Artemis.app/Contents/MacOS/Artemis \
          --build-info > native-build-info.json
        EXPECTED_VERSION="$(tr -d '\r\n' < app/version.txt)"
        export EXPECTED_VERSION
        python3 - <<'PY'
        import json
        import os

        with open("native-build-info.json", encoding="utf-8") as build_info_file:
            data = json.load(build_info_file)
        assert data["schema"] == 1
        assert data["applicationId"] == os.environ["VIBERTEMIS_APPLICATION_ID"]
        assert data["commit"] == os.environ["VIBERTEMIS_BUILD_COMMIT"]
        assert data["channel"] == os.environ["VIBERTEMIS_UPDATE_CHANNEL"]
        assert data["sequence"] == "0"
        assert data["version"] == os.environ["EXPECTED_VERSION"]
        assert data["internallyConsistent"] is True
        PY

    - name: Package and verify macOS development build
      env:
        VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        export PATH="$Qt6_DIR/bin:$PATH"
        ARTEMIS_MAC_ARCHS="$(uname -m)" \
          ./scripts/generate-dmg.sh Release "$VERSION" package-only
        build/build-Release/app/Vibertemis.app/Contents/MacOS/Artemis \
          --build-info > packaged-native-build-info.json
        EXPECTED_VERSION="$(tr -d '\r\n' < app/version.txt)"
        export EXPECTED_VERSION
        python3 - <<'PY'
        import json
        import os

        with open("packaged-native-build-info.json", encoding="utf-8") as build_info_file:
            data = json.load(build_info_file)
        assert data["schema"] == 1
        assert data["applicationId"] == os.environ["VIBERTEMIS_APPLICATION_ID"]
        assert data["commit"] == os.environ["VIBERTEMIS_BUILD_COMMIT"]
        assert data["channel"] == os.environ["VIBERTEMIS_UPDATE_CHANNEL"]
        assert data["sequence"] == "0"
        assert data["version"] == os.environ["EXPECTED_VERSION"]
        assert data["internallyConsistent"] is True
        PY
        ./scripts/verify-macos-bundle.sh \
          build/build-Release/app/Vibertemis.app \
          "build/installer-Release/Vibertemis-$VERSION.dmg"

    - name: Inspect packaged architecture
      id: macos_arch
      run: |
        ACTUAL_ARCHS=$(lipo -archs build/build-Release/app/Vibertemis.app/Contents/MacOS/Artemis)
        if [[ " $ACTUAL_ARCHS " == *" arm64 "* && " $ACTUAL_ARCHS " == *" x86_64 "* ]]; then
          SUFFIX=universal
        elif [[ "$ACTUAL_ARCHS" == "arm64" ]]; then
          SUFFIX=arm64
        elif [[ "$ACTUAL_ARCHS" == "x86_64" ]]; then
          SUFFIX=x86_64
        else
          SUFFIX=$(echo "$ACTUAL_ARCHS" | tr ' ' '-' | tr -cd '[:alnum:]_-')
        fi
        test -n "$SUFFIX"
        echo "Architectures: $ACTUAL_ARCHS"
        echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"

    - name: Upload macOS DMG
      uses: actions/upload-artifact@v4
      with:
        name: vibertemis-macos-${{ steps.macos_arch.outputs.suffix }}-${{ needs.setup-version.outputs.version }}
        path: build/installer-Release/Vibertemis-${{ needs.setup-version.outputs.version }}.dmg
        retention-days: 30

  build-linux-dev:
    name: Linux Development Build
    needs: setup-version
    runs-on: ubuntu-22.04
    if: needs.setup-version.outputs.should_build == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Display version info
      run: |
        echo "Using semantic version: ${{ needs.setup-version.outputs.version }}"
        echo "Using numeric version: ${{ needs.setup-version.outputs.numeric_version }}"
        echo "Is prerelease: ${{ needs.setup-version.outputs.is_prerelease }}"
    
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        modules: 'qtmultimedia'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libegl1-mesa-dev libgl1-mesa-dev libopus-dev libsdl2-dev \
          libsdl2-ttf-dev libsdl2-ttf-2.0-0 libssl-dev libavcodec-dev libavformat-dev \
          libswscale-dev libva-dev libvdpau-dev libxkbcommon-dev \
          wayland-protocols libdrm-dev nasm libgbm-dev \
          libfreetype6-dev libasound2-dev libdbus-1-dev \
          libgles2-mesa-dev libglu1-mesa-dev libibus-1.0-dev \
          libpulse-dev libudev-dev libx11-dev libxcursor-dev \
          libxext-dev libxi-dev libxinerama-dev libxrandr-dev \
          libxss-dev libxt-dev libxv-dev libxxf86vm-dev \
          libxcb-dri3-dev libx11-xcb-dev libplacebo-dev
    
    - name: Clean any existing build
      run: |
        rm -f .qmake.stash .qmake.cache
        find . -name "Makefile*" -delete
        rm -rf moonlight-common-c/Makefile* moonlight-common-c/.qmake.stash
        rm -rf qmdnsengine/Makefile* qmdnsengine/.qmake.stash 
        rm -rf h264bitstream/Makefile* h264bitstream/.qmake.stash
        rm -rf app/Makefile* app/.qmake.stash
    
    - name: Build
      run: |
        export PATH="$Qt6_DIR/bin:$PATH"
        export QMAKE="$Qt6_DIR/bin/qmake6"
        qmake6 artemis.pro CONFIG+=release "QMAKE_CXXFLAGS+=-fPIC"
        make -j$(nproc)
    
    
    - name: Create dependency bundle for Linux
      run: |
        echo "=== Creating dependency bundle ==="
        mkdir -p linux-package/lib
        mkdir -p linux-package/bin
        
        # Copy the main binary
        cp app/artemis linux-package/bin/
        
        # Bundle critical shared libraries that may not be available on all systems
        # Include SDL2 main library and SDL2_ttf which are commonly missing
        echo "Bundling SDL2 libraries..."
        ldd app/artemis | grep -E "(libSDL2-2\.0|libSDL2_ttf|libopus|libssl)" | while read -r line; do
          lib_path=$(echo "$line" | grep -o '/[^[:space:]]*')
          if [ -n "$lib_path" ] && [ -f "$lib_path" ]; then
            lib_name=$(basename "$lib_path")
            echo "Bundling library: $lib_name from $lib_path"
            cp "$lib_path" linux-package/lib/
          fi
        done
        
        # Also explicitly check for and bundle SDL2 main library if not caught above
        if [ ! -f "linux-package/lib/libSDL2-2.0.so.0" ]; then
          echo "Explicitly looking for SDL2 main library..."
          SDL2_LIB=$(find /usr/lib* /lib* -name "libSDL2-2.0.so.0" 2>/dev/null | head -1)
          if [ -n "$SDL2_LIB" ] && [ -f "$SDL2_LIB" ]; then
            echo "Found and bundling SDL2 main library: $SDL2_LIB"
            cp "$SDL2_LIB" linux-package/lib/
          fi
        fi
        
        # Create launch script that sets library path
        cat > linux-package/artemis << 'EOF'
        #!/bin/bash
        # Vibertemis launcher script (the executable name remains compatible)
        
        # Resolve the actual directory where this script is located
        # This handles symlinks properly (e.g., ~/.local/bin/artemis -> ~/.local/share/artemis-desktop/artemis)
        if [ -L "${BASH_SOURCE[0]}" ]; then
            # Script is a symlink, resolve to actual location
            SCRIPT_DIR="$(cd "$(dirname "$(readlink -f "${BASH_SOURCE[0]}")")" && pwd)"
        else
            # Script is not a symlink, use dirname normally
            SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        fi
        
        # Set library path and execute binary
        export LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"
        exec "$SCRIPT_DIR/bin/artemis" "$@"
        EOF
        chmod +x linux-package/artemis
        
        # Create installation script
        cat > linux-package/install.sh << 'EOF'
        #!/bin/bash
        echo "Installing Vibertemis..."
        
        # Install to local directory
        INSTALL_DIR="$HOME/.local/share/artemis-desktop"
        BIN_DIR="$HOME/.local/bin"
        
        mkdir -p "$INSTALL_DIR" "$BIN_DIR"
        
        # Copy all files
        cp -r * "$INSTALL_DIR/"
        
        # Create symlink to launcher
        ln -sf "$INSTALL_DIR/artemis" "$BIN_DIR/artemis"
        
        # Create desktop entry
        mkdir -p "$HOME/.local/share/applications"
        cat > "$HOME/.local/share/applications/artemis-desktop.desktop" << 'EOD'
        [Desktop Entry]
        Type=Application
        Name=Vibertemis
        Comment=Game streaming client
        Exec=artemis
        Icon=artemis-desktop
        Categories=Game;Network;
        EOD
        
        echo "Installation complete!"
        echo "You can run 'artemis' from terminal or find it in your applications menu."
        echo "If 'artemis' command is not found, add ~/.local/bin to your PATH"
        EOF
        chmod +x linux-package/install.sh
        
        # Copy library info for debugging
        ldd app/artemis > linux-package/library_dependencies.txt || echo "ldd failed" > linux-package/library_dependencies.txt
        
        echo "=== Linux package contents ==="
        ls -la linux-package/
        ls -la linux-package/lib/
    
    - name: Package Linux Development Build
      env:
        VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        # Create info file with semantic versioning
        cat > linux-package/build_info.txt << EOF
        Vibertemis Development Build (Linux)
        Version: $VERSION
        Numeric Version: ${{ needs.setup-version.outputs.numeric_version }}
        Is Prerelease: ${{ needs.setup-version.outputs.is_prerelease }}
        Branch: ${{ github.ref_name }}
        Commit: ${{ github.sha }}
        Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        
        Installation:
        1. Extract this archive
        2. Run: ./install.sh (installs to ~/.local/)
        3. Or run directly: ./artemis
        
        Manual dependencies (if needed):
        - SDL2_ttf: sudo apt install libsdl2-ttf-2.0-0
        - OpenSSL: sudo apt install libssl3
        - FFmpeg: sudo apt install libavcodec58 libavformat58
        EOF
        
        # Create README for users
        cat > linux-package/README.md << 'EOF'
        # Vibertemis - Linux Build
        
        ## Quick Installation
        
        1. Extract this archive
        2. Run the installer: `./install.sh`
        3. Launch from terminal: `artemis`
        
        ## Manual Installation
        
        1. Run directly: `./artemis`
        2. If you get library errors, install missing dependencies:
        
        ```bash
        # Ubuntu/Debian:
        sudo apt update
        sudo apt install libsdl2-ttf-2.0-0 libssl3 libavcodec58 libavformat58
        
        # Fedora/RHEL:
        sudo dnf install SDL2_ttf openssl-libs ffmpeg-libs
        
        # Arch Linux:
        sudo pacman -S sdl2_ttf openssl ffmpeg
        ```
        
        ## Troubleshooting
        
        - If you see "libSDL2_ttf-2.0.so.0: cannot open shared object file":
          - Install SDL2_ttf: `sudo apt install libsdl2-ttf-2.0-0`
        
        - Check library_dependencies.txt for full dependency list
        - Run with debugging: `LD_DEBUG=libs ./artemis`
        EOF
        
        # Package with semantic version
        tar -czf vibertemis-linux-$VERSION.tar.gz -C linux-package .
    - name: Upload Development Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vibertemis-linux-${{ needs.setup-version.outputs.version }}
        path: vibertemis-linux-${{ needs.setup-version.outputs.version }}.tar.gz
        retention-days: 30

  build-appimage-dev:
    name: AppImage Development Build (Moonlight Compatible Dependencies)
    needs: setup-version
    runs-on: ubuntu-22.04  # Use Ubuntu 22.04 since 20.04 is deprecated
    if: false  # Temporarily disabled
    # if: needs.setup-version.outputs.should_build == 'true'
    
    env:
      FFMPEG_CONFIGURE_ARGS: --enable-pic --disable-static --enable-shared --disable-all --enable-avcodec --enable-avformat --enable-swscale --enable-decoder=h264 --enable-decoder=hevc --enable-decoder=av1 --enable-hwaccel=h264_vaapi --enable-hwaccel=hevc_vaapi --enable-hwaccel=av1_vaapi --enable-hwaccel=h264_vdpau --enable-hwaccel=hevc_vdpau --enable-hwaccel=av1_vdpau --enable-hwaccel=h264_vulkan --enable-hwaccel=hevc_vulkan --enable-hwaccel=av1_vulkan --enable-libdav1d --enable-decoder=libdav1d
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Get version
      id: version
      run: |
        VERSION=${{ needs.setup-version.outputs.version }}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Using version: $VERSION"
    
    - name: Setup Qt 6
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        modules: 'qtmultimedia'
      continue-on-error: true
      id: qt_install
        
    - name: Retry Qt Installation (if failed)
      if: steps.qt_install.outcome == 'failure'
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        modules: 'qtmultimedia'
    
    - name: Install FUSE and build dependencies (matching Moonlight)
      run: |
        # Use the correct Vulkan SDK repository for Ubuntu 22.04 (Jammy)
        wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.3.280-jammy.list https://packages.lunarg.com/vulkan/1.3.280/lunarg-vulkan-1.3.280-jammy.list
        sudo apt update || true
        
        # Install FUSE first (required for AppImage creation)
        sudo apt install -y libfuse2 fuse
        
        # Install AppImage creation tools
        sudo apt install -y squashfs-tools
        
        # Try to install appimagetool from GitHub releases
        wget -O /tmp/appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x /tmp/appimagetool.AppImage
        sudo mv /tmp/appimagetool.AppImage /usr/local/bin/appimagetool
        
        # Install build dependencies (without Vulkan SDK to avoid conflicts)
        sudo apt install -y python3-pip nasm libgbm-dev libdrm-dev libfreetype6-dev libasound2-dev libdbus-1-dev libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libglu1-mesa-dev libibus-1.0-dev libpulse-dev libudev-dev libx11-dev libxcursor-dev libxext-dev libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev libxss-dev libxt-dev libxv-dev libxxf86vm-dev libxcb-dri3-dev libx11-xcb-dev wayland-protocols libopus-dev libvdpau-dev libwayland-dev libwayland-client0 libwayland-cursor0 libwayland-server0 libwayland-egl1-mesa libplacebo-dev || echo "libplacebo-dev not available, will build from source"
        
        # Try to install Vulkan SDK, but don't fail the build if it has dependency issues
        sudo apt install -y vulkan-sdk || echo "Vulkan SDK installation had conflicts, proceeding without it"
        
        sudo pip3 install meson
    
    - name: Build SDL2 from source (exact version used by Moonlight)
      run: |
        export SDL2_REV=86fd4ed83cdcf71fef6a57766b126e88f923acd3
        git clone https://github.com/libsdl-org/SDL.git SDL2
        cd SDL2
        git checkout $SDL2_REV
        ./configure
        make -j$(nproc)
        sudo make install
        cd ..
    
    - name: Build SDL2_ttf from source (exact version used by Moonlight)
      run: |
        export SDL2_TTF_VER=2.22.0
        wget https://github.com/libsdl-org/SDL_ttf/releases/download/release-$SDL2_TTF_VER/SDL2_ttf-$SDL2_TTF_VER.tar.gz
        tar -xf SDL2_ttf-$SDL2_TTF_VER.tar.gz
        cd SDL2_ttf-$SDL2_TTF_VER
        ./configure
        make -j$(nproc)
        sudo make install
        cd ..
    
    - name: Build libva from source (exact version used by Moonlight)
      run: |
        export LIBVA_VER=2.22.0
        git clone --branch $LIBVA_VER --depth 1 https://github.com/intel/libva.git
        cd libva
        ./autogen.sh
        ./configure --enable-x11 --enable-wayland
        make -j$(nproc)
        sudo make install
        cd ..
    
    - name: Build dav1d from source (exact version used by Moonlight)
      run: |
        export DAV1D_VER=1.5.0
        git clone --branch $DAV1D_VER --depth 1 https://code.videolan.org/videolan/dav1d.git
        cd dav1d
        meson setup build -Ddefault_library=static -Dbuildtype=release -Denable_tools=false -Denable_tests=false
        ninja -C build
        sudo ninja install -C build
        sudo ldconfig
        cd ..
    
    - name: Build libplacebo from source with patches (exact version used by Moonlight)
      run: |
        export LIBPLACEBO_REV=v7.349.0
        git clone https://code.videolan.org/videolan/libplacebo.git
        cd libplacebo
        git checkout $LIBPLACEBO_REV
        # Apply the same patch that Moonlight uses
        if [ -f "../app/deploy/linux/appimage/*.patch" ]; then
          git apply ../app/deploy/linux/appimage/*.patch || echo "No patches to apply"
        fi
        git submodule update --init --recursive
        meson setup build -Dvulkan=enabled -Dopengl=disabled -Ddemos=false
        ninja -C build
        sudo ninja install -C build
        sudo ldconfig
        cd ..
    
    - name: Build FFmpeg from source (exact version and config used by Moonlight)
      run: |
        export FFMPEG_REV=87ccf995cb855f0baced9916928b7b48d8b6ed9d
        git clone https://github.com/FFmpeg/FFmpeg.git FFmpeg
        cd FFmpeg
        git checkout $FFMPEG_REV
        ./configure $FFMPEG_CONFIGURE_ARGS
        make -j$(nproc)
        sudo make install
        sudo ldconfig
        cd ..
    
    - name: Download and extract linuxdeployqt
      run: |
        mkdir -p $HOME/bin
        wget -O $HOME/linuxdeployqt.AppImage https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
        chmod a+x $HOME/linuxdeployqt.AppImage
        
        # Try to run the AppImage normally first
        if $HOME/linuxdeployqt.AppImage --version > /dev/null 2>&1; then
          echo "AppImage works directly"
          mv $HOME/linuxdeployqt.AppImage $HOME/bin/linuxdeployqt
        else
          echo "AppImage needs extraction, extracting..."
          cd $HOME
          # Extract the AppImage
          $HOME/linuxdeployqt.AppImage --appimage-extract
          # Move the executable to bin and make it available
          mv squashfs-root/AppRun $HOME/bin/linuxdeployqt
          chmod +x $HOME/bin/linuxdeployqt
          # Clean up
          rm -rf squashfs-root
          rm $HOME/linuxdeployqt.AppImage
        fi
        
        echo "$HOME/bin" >> $GITHUB_PATH
    
    - name: Build Vibertemis with Qt 6 for AppImage
      run: |
        # Set Qt 6 environment (variables are set from jurplel/install-qt-action)
        export PATH="$Qt6_DIR/bin:$PATH"
        export QMAKE="$Qt6_DIR/bin/qmake6"
        
        # Verify Qt installation
        which qmake6 || echo "qmake6 not found in PATH"
        echo "Qt6_DIR: $Qt6_DIR"
        ls -la "$Qt6_DIR/bin/" || echo "Qt6 bin directory not found"
        
        # Clean any existing build
        rm -rf build/
        rm -f .qmake.stash .qmake.cache
        find . -name "Makefile*" -delete || true
        
        # Build Vibertemis with Qt 6 without the optional upstream dependency bundle
        git -c submodule.libs.update=none submodule update --init --recursive
        
        # Build the project using Qt 6
        qmake6 artemis.pro CONFIG+=release "QMAKE_CXXFLAGS+=-fPIC"
        make -j$(nproc)

        app/artemis --build-info > native-build-info.json
        export EXPECTED_VERSION="$(tr -d '\r\n' < app/version.txt)"
        python3 - <<'PY'
        import json
        import os

        with open("native-build-info.json", encoding="utf-8") as build_info_file:
            data = json.load(build_info_file)
        assert data["schema"] == 1
        assert data["applicationId"] == os.environ["VIBERTEMIS_APPLICATION_ID"]
        assert data["commit"] == os.environ["VIBERTEMIS_BUILD_COMMIT"]
        assert data["channel"] == os.environ["VIBERTEMIS_UPDATE_CHANNEL"]
        assert data["sequence"] == "0"
        assert data["version"] == os.environ["EXPECTED_VERSION"]
        assert data["internallyConsistent"] is True
        PY
        
        # Create AppImage directory structure
        mkdir -p build/installer-release
        mkdir -p build/build-release/usr/bin
        mkdir -p build/build-release/usr/share/applications
        mkdir -p build/build-release/usr/share/icons/hicolor/256x256/apps
        mkdir -p build/build-release/usr/share/icons/hicolor/scalable/apps
        
        # Copy the binary
        cp app/artemis build/build-release/usr/bin/
        
        # Copy the existing compatibility-named Vibertemis icons
        if [ -f "app/artemis.png" ]; then
          cp app/artemis.png build/build-release/usr/share/icons/hicolor/256x256/apps/artemis.png
        fi
        if [ -f "app/res/artemis.svg" ]; then
          cp app/res/artemis.svg build/build-release/usr/share/icons/hicolor/scalable/apps/artemis.svg
        fi
        
        # Create a desktop file
        cat > build/build-release/usr/share/applications/artemis.desktop << 'EOF'
        [Desktop Entry]
        Type=Application
        Name=Vibertemis
        Comment=Game streaming client for NVIDIA GameStream and Sunshine
        Exec=artemis
        Icon=artemis
        Categories=Game;Network;
        Keywords=gaming;streaming;nvidia;gamestream;sunshine;
        StartupNotify=true
        MimeType=x-scheme-handler/artemis;
        EOF
        
        # Build an AppDir with linuxdeployqt, then package with our own AppRun (fixes path issues on Steam Deck)
        export PATH=$HOME/bin:$PATH
        cd build/build-release
        
        echo "=== Environment Check ==="
        echo "PWD: $(pwd)"
        echo "PATH: $PATH"
        which linuxdeployqt && linuxdeployqt --version || echo "linuxdeployqt not found"
        which appimagetool && appimagetool --version || echo "appimagetool not found"
        
        echo "=== Preparing AppDir with linuxdeployqt ==="
        linuxdeployqt usr/share/applications/artemis.desktop -unsupported-allow-new-glibc -verbose=2 2>&1 | tee linuxdeployqt.log
        
        if [ ! -d "usr" ] || [ ! -f "usr/bin/artemis" ]; then
          echo "ERROR: AppDir not prepared correctly"
          exit 1
        fi
        
        echo "=== Inject custom AppRun ==="
        cat > AppRun << 'APPRUN_EOF'
        #!/bin/bash
        HERE="$(dirname "$(readlink -f "${0}")")"
        export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/lib:${LD_LIBRARY_PATH}"
        export QT_PLUGIN_PATH="${HERE}/usr/lib/qt6/plugins:${QT_PLUGIN_PATH}"
        exec "${HERE}/usr/bin/artemis" "$@"
        APPRUN_EOF
        chmod +x AppRun
        
        # Ensure a desktop file is at the AppDir root for appimagetool
        cp -f usr/share/applications/artemis.desktop . || true
        
        # Ensure an application icon is available at AppDir root for appimagetool
        if [ -f "usr/share/icons/hicolor/256x256/apps/artemis.png" ]; then
          cp -f usr/share/icons/hicolor/256x256/apps/artemis.png ./artemis.png
        elif [ -f "usr/share/icons/hicolor/scalable/apps/artemis.svg" ]; then
          cp -f usr/share/icons/hicolor/scalable/apps/artemis.svg ./artemis.svg
        fi
        
        echo "=== Creating AppImage with appimagetool ==="
        ARCH=x86_64 appimagetool . "../installer-release/Vibertemis-${{ needs.setup-version.outputs.version }}-x86_64.AppImage" 2>&1 | tee appimagetool.log
        
        if [ ! -f "../installer-release/Vibertemis-${{ needs.setup-version.outputs.version }}-x86_64.AppImage" ]; then
          echo "ERROR: appimagetool failed"
          tail -50 appimagetool.log || true
          exit 1
        fi
    
    - name: Verify AppImage was created successfully
      run: |
        ls -lh build/installer-release/
        APPIMAGE_FILE=$(ls build/installer-release/*.AppImage | head -n1)
        if [ -f "$APPIMAGE_FILE" ]; then
          echo "AppImage created: $APPIMAGE_FILE"
          file "$APPIMAGE_FILE"
          echo "Size: $(du -h "$APPIMAGE_FILE" | cut -f1)"
          
          # Extract and check contents
          chmod +x "$APPIMAGE_FILE"
          "$APPIMAGE_FILE" --appimage-extract >/dev/null 2>&1 || echo "Extraction failed"
          if [ -d "squashfs-root" ]; then
            echo "AppImage contents size:"
            du -sh squashfs-root/
            echo "Key libraries bundled:"
            find squashfs-root -name "*.so*" -type f | grep -E "(Qt|SDL|ffmpeg|av|codec|va|vdpau)" | sort
          fi
        else
          echo "ERROR: No AppImage file found!"
          exit 1
        fi
    
    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: vibertemis-appimage-${{ needs.setup-version.outputs.version }}
        path: build/installer-release/Vibertemis-${{ needs.setup-version.outputs.version }}-x86_64.AppImage
        retention-days: 30

  build-flatpak-dev:
    name: Flatpak Development Build
    needs: setup-version
    runs-on: ubuntu-24.04
    if: needs.setup-version.outputs.should_build == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Display version info
      run: echo "Using development version ${{ needs.setup-version.outputs.version }}"
    
    - name: Install Flatpak and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        sudo flatpak install -y flathub org.kde.Platform//6.10 org.kde.Sdk//6.10

    - name: Validate tracked Flatpak manifest
      run: |
        python3 -m unittest discover -s packaging/flatpak/tests -p 'test_*.py' -v
        python3 packaging/flatpak/validate-manifest.py packaging/flatpak/com.artemisdesktop.ArtemisDesktopDev.json

    - name: Derive Flatpak build identity
      id: flatpak_identity
      shell: bash
      run: |
        set -euo pipefail
        channel=none
        sequence=0
        if [[ "$GITHUB_REPOSITORY" == "samelamin/vibertemis" &&
              "$GITHUB_REF" == "refs/heads/main" ]]; then
          channel=rolling
          sequence=$GITHUB_RUN_ID
        fi
        {
          echo "commit=$GITHUB_SHA"
          echo "channel=$channel"
          echo "sequence=$sequence"
        } >> "$GITHUB_OUTPUT"

    - name: Prepare immutable CI Flatpak manifest
      run: |
        python3 packaging/flatpak/prepare-ci-manifest.py \
          --input packaging/flatpak/com.artemisdesktop.ArtemisDesktopDev.json \
          --output packaging/flatpak/com.artemisdesktop.ArtemisDesktopDev.ci.json \
          --commit "${{ steps.flatpak_identity.outputs.commit }}" \
          --channel "${{ steps.flatpak_identity.outputs.channel }}" \
          --sequence "${{ steps.flatpak_identity.outputs.sequence }}" \
          --application-id com.artemisdesktop.ArtemisDesktopDev

    - name: Allow Flatpak local submodule mirrors
      run: |
        # This runner is ephemeral. Flatpak-builder uses local Git mirrors to
        # populate the pinned submodules after downloading their exact commits.
        git config --global protocol.file.allow always
    
    - name: Build identity-stamped Flatpak
      env:
        VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        flatpak-builder --force-clean --install-deps-from=flathub --repo=flatpak-repo flatpak-build packaging/flatpak/com.artemisdesktop.ArtemisDesktopDev.ci.json
        flatpak build flatpak-build env QT_QPA_PLATFORM=offscreen /app/libexec/tst_refreshrate

    - name: Verify Flatpak build identity and bundle
      env:
        VERSION: ${{ needs.setup-version.outputs.version }}
        EXPECTED_COMMIT: ${{ steps.flatpak_identity.outputs.commit }}
        EXPECTED_CHANNEL: ${{ steps.flatpak_identity.outputs.channel }}
        EXPECTED_SEQUENCE: ${{ steps.flatpak_identity.outputs.sequence }}
      run: |
        flatpak build flatpak-build env QT_QPA_PLATFORM=offscreen \
          /app/bin/artemis --build-info > flatpak-build-info.json
        export EXPECTED_VERSION="$(tr -d '\r\n' < app/version.txt)"
        python3 - <<'PY'
        import json
        import os

        with open("flatpak-build-info.json", encoding="utf-8") as build_info_file:
            data = json.load(build_info_file)
        assert data["schema"] == 1
        assert data["applicationId"] == "com.artemisdesktop.ArtemisDesktopDev"
        assert data["commit"] == os.environ["EXPECTED_COMMIT"]
        assert data["channel"] == os.environ["EXPECTED_CHANNEL"]
        assert data["sequence"] == os.environ["EXPECTED_SEQUENCE"]
        assert data["version"] == os.environ["EXPECTED_VERSION"]
        assert data["internallyConsistent"] is True
        PY
        flatpak build-bundle flatpak-repo "artemis-flatpak-$VERSION.flatpak" com.artemisdesktop.ArtemisDesktopDev

    - name: Verify Flatpak build result
      run: |
        flatpak build flatpak-build /app/libexec/artemis-codec-probe
        flatpak build flatpak-build test -x /app/bin/artemis
        flatpak build flatpak-build appstreamcli validate --no-net /app/share/metainfo/com.artemisdesktop.ArtemisDesktopDev.metainfo.xml
        flatpak build flatpak-build sh -euxc 'ldd /app/bin/artemis | tee /tmp/artemis-ldd.txt; ! grep -q "not found" /tmp/artemis-ldd.txt; for lib in libavcodec libplacebo libSDL2-2.0 libSDL2_ttf-2.0; do find /app/lib -name "$lib.so*" -print -quit | grep -q .; done'

    - name: Smoke test Flatpak application
      run: |
        set +e
        timeout 10s flatpak build flatpak-build env QT_QPA_PLATFORM=offscreen SDL_VIDEODRIVER=dummy /app/bin/artemis >artemis-smoke.log 2>&1
        status=$?
        set -e
        if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
          cat artemis-smoke.log
          exit "$status"
        fi
    
    - name: Upload Flatpak Development Artifacts
      uses: actions/upload-artifact@v4
      with:
        # Compatibility contract: the rolling publisher consumes this established artifact name.
        name: artemis-flatpak-${{ needs.setup-version.outputs.version }}
        path: |
          artemis-flatpak-${{ needs.setup-version.outputs.version }}.flatpak
          flatpak-build-info.json
          artemis-smoke.log
        retention-days: 30

  publish-steam-deck-release:
    name: Publish verified Steam Deck Flatpak
    needs: [setup-version, build-flatpak-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: steam-deck-rolling-publisher
      cancel-in-progress: false
    if: >-
      github.repository == 'samelamin/vibertemis' &&
      github.ref == 'refs/heads/main' &&
      needs.setup-version.outputs.should_build == 'true'
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ needs.setup-version.outputs.version }}
      SOURCE_COMMIT: ${{ github.sha }}
      BUILD_SEQUENCE: ${{ github.run_id }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Confirm source commit is current main head
        id: initial-main-head
        run: |
          set -euo pipefail
          main_head="$(gh api "repos/$GH_REPO/git/ref/heads/main" --jq '.object.sha')"
          if [ "$main_head" != "$SOURCE_COMMIT" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping superseded build $SOURCE_COMMIT; main head is $main_head"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout exact publisher source
        if: steps.initial-main-head.outputs.publish == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download exact Flatpak build artifact
        if: steps.initial-main-head.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: artemis-flatpak-${{ needs.setup-version.outputs.version }}
          path: steam-deck-artifact

      - name: Inspect build identity and prepare Flatpak
        if: steps.initial-main-head.outputs.publish == 'true'
        run: |
          set -euo pipefail
          source_path="steam-deck-artifact/artemis-flatpak-$VERSION.flatpak"
          build_info_path="steam-deck-artifact/flatpak-build-info.json"
          test -f "$source_path"
          test -f "$build_info_path"
          python3 - <<'PY'
          import json
          import os

          with open(
              "steam-deck-artifact/flatpak-build-info.json",
              encoding="utf-8",
          ) as build_info_file:
              data = json.load(build_info_file)
          assert set(data) == {
              "applicationId",
              "channel",
              "commit",
              "internallyConsistent",
              "schema",
              "sequence",
              "version",
          }
          assert data["schema"] == 1
          assert data["applicationId"] == "com.artemisdesktop.ArtemisDesktopDev"
          assert data["commit"] == os.environ["SOURCE_COMMIT"]
          assert data["channel"] == "rolling"
          assert data["sequence"] == os.environ["BUILD_SEQUENCE"]
          assert data["version"] == os.environ["VERSION"]
          assert data["internallyConsistent"] is True
          PY

          mkdir -p release-assets
          install -m 0644 "$source_path" release-assets/artemis-steam-deck.flatpak
          EXPECTED_SHA="$(sha256sum release-assets/artemis-steam-deck.flatpak | awk '{print $1}')"
          EXPECTED_SIZE="$(stat --format=%s release-assets/artemis-steam-deck.flatpak)"
          test "$EXPECTED_SIZE" -gt 0
          {
            echo "EXPECTED_SHA=$EXPECTED_SHA"
            echo "EXPECTED_SIZE=$EXPECTED_SIZE"
          } >> "$GITHUB_ENV"

      - name: Create or mark rolling prerelease as updating
        if: steps.initial-main-head.outputs.publish == 'true'
        run: |
          set -euo pipefail
          cat > release-notes-pending.md <<EOF
          # Vibertemis Steam Deck rolling build

          A new verified Flatpak is being published from commit \`$SOURCE_COMMIT\`.
          Update metadata and checksum assets are withheld until every published byte has been verified.

          This rolling prerelease is replaced by every later successful build from main.
          EOF

          if gh release view steam-deck-latest >/dev/null 2>&1; then
            gh release edit steam-deck-latest \
              --title "Vibertemis Steam Deck rolling build" \
              --notes-file release-notes-pending.md \
              --prerelease
          else
            gh release create steam-deck-latest \
              --target "$SOURCE_COMMIT" \
              --title "Vibertemis Steam Deck rolling build" \
              --notes-file release-notes-pending.md \
              --prerelease
          fi

          gh api "repos/$GH_REPO/releases/tags/steam-deck-latest" \
            > existing-release-assets.json
          python3 - <<'PY'
          import json

          UINT64_MAX = (1 << 64) - 1
          known_names = {
              "artemis-steam-deck.flatpak",
              "artemis-steam-deck-update.json",
              "artemis-steam-deck.flatpak.sha256",
              "artemis-steam-deck-bundle.tar.gz",
          }
          with open("existing-release-assets.json", encoding="utf-8") as source:
              release = json.load(source)
          assert release["tag_name"] == "steam-deck-latest"
          confirmed = {}
          for asset in release["assets"]:
              name = asset.get("name")
              if name not in known_names:
                  continue
              assert name not in confirmed, f"duplicate existing asset: {name}"
              asset_id = asset["id"]
              assert isinstance(asset_id, int) and not isinstance(asset_id, bool)
              assert 0 < asset_id <= UINT64_MAX
              confirmed[name] = str(asset_id)
          with open(
              "confirmed-existing-asset-ids.txt",
              "w",
              encoding="utf-8",
          ) as output:
              for name in sorted(confirmed):
                  output.write(f"{confirmed[name]}\n")
          PY
          while IFS= read -r asset_id; do
            [[ "$asset_id" =~ ^[1-9][0-9]*$ ]]
            gh api --method DELETE \
              "repos/$GH_REPO/releases/assets/$asset_id"
          done < confirmed-existing-asset-ids.txt

      - name: Upload and bind the exact Flatpak asset
        if: steps.initial-main-head.outputs.publish == 'true'
        run: |
          set -euo pipefail
          gh release upload steam-deck-latest release-assets/artemis-steam-deck.flatpak
          gh api "repos/$GH_REPO/releases/tags/steam-deck-latest" \
            > release-with-flatpak.json
          python3 - <<'PY'
          from datetime import datetime
          import json
          import os
          import re

          UINT64_MAX = (1 << 64) - 1
          def identifier(value, field):
              assert isinstance(value, int) and not isinstance(value, bool), field
              assert 0 < value <= UINT64_MAX, field
              return str(value)

          with open("release-with-flatpak.json", encoding="utf-8") as source:
              release = json.load(source)
          release_id = identifier(release["id"], "release id")
          assert release["tag_name"] == "steam-deck-latest"
          assert release["draft"] is False
          assert release["prerelease"] is True
          assets = [
              asset for asset in release["assets"]
              if asset["name"] == "artemis-steam-deck.flatpak"
          ]
          assert len(assets) == 1
          asset = assets[0]
          asset_id = identifier(asset["id"], "asset id")
          asset_size = identifier(asset["size"], "asset size")
          assert asset_size == os.environ["EXPECTED_SIZE"]
          updated_at = asset["updated_at"]
          assert isinstance(updated_at, str)
          assert re.fullmatch(
              r"[0-9]{4}-[0-9]{2}-[0-9]{2}T"
              r"[0-9]{2}:[0-9]{2}:[0-9]{2}Z",
              updated_at,
          )
          assert (
              datetime.strptime(updated_at, "%Y-%m-%dT%H:%M:%SZ")
              .strftime("%Y-%m-%dT%H:%M:%SZ")
              == updated_at
          )
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              output.write(f"RELEASE_ID={release_id}\n")
              output.write(f"FLATPAK_ASSET_ID={asset_id}\n")
              output.write(f"FLATPAK_ASSET_SIZE={asset_size}\n")
              output.write(f"FLATPAK_UPDATED_AT={updated_at}\n")
          PY

      - name: Verify exact Flatpak bytes and prepare companions
        if: steps.initial-main-head.outputs.publish == 'true'
        run: |
          set -euo pipefail
          mkdir -p published-assets
          gh api --method GET \
            -H "Accept: application/octet-stream" \
            "repos/$GH_REPO/releases/assets/$FLATPAK_ASSET_ID" \
            > published-assets/artemis-steam-deck.flatpak
          published_size="$(stat --format=%s published-assets/artemis-steam-deck.flatpak)"
          published_sha="$(sha256sum published-assets/artemis-steam-deck.flatpak | awk '{print $1}')"
          test "$published_size" = "$FLATPAK_ASSET_SIZE"
          test "$published_size" = "$EXPECTED_SIZE"
          test "$published_sha" = "$EXPECTED_SHA"
          cmp release-assets/artemis-steam-deck.flatpak \
            published-assets/artemis-steam-deck.flatpak

          python3 packaging/flatpak/generate-update-manifest.py \
            --output release-assets/artemis-steam-deck-update.json \
            --source-commit "$SOURCE_COMMIT" \
            --build-sequence "$BUILD_SEQUENCE" \
            --release-id "$RELEASE_ID" \
            --flatpak-asset-id "$FLATPAK_ASSET_ID" \
            --flatpak-size "$FLATPAK_ASSET_SIZE" \
            --flatpak-sha256 "$EXPECTED_SHA" \
            --published-at "$FLATPAK_UPDATED_AT"
          (
            cd release-assets
            sha256sum artemis-steam-deck.flatpak > artemis-steam-deck.flatpak.sha256
            tar -czf artemis-steam-deck-bundle.tar.gz \
              artemis-steam-deck.flatpak \
              artemis-steam-deck.flatpak.sha256
          )

      - name: Upload companions and verify every public asset
        if: steps.initial-main-head.outputs.publish == 'true'
        run: |
          set -euo pipefail
          gh release upload steam-deck-latest \
            release-assets/artemis-steam-deck-update.json \
            release-assets/artemis-steam-deck.flatpak.sha256 \
            release-assets/artemis-steam-deck-bundle.tar.gz
          gh api "repos/$GH_REPO/releases/tags/steam-deck-latest" \
            > release-public-assets.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          UINT64_MAX = (1 << 64) - 1
          names = {
              "artemis-steam-deck.flatpak": "PUBLIC_FLATPAK_ASSET_ID",
              "artemis-steam-deck-update.json": "PUBLIC_MANIFEST_ASSET_ID",
              "artemis-steam-deck.flatpak.sha256": "PUBLIC_CHECKSUM_ASSET_ID",
              "artemis-steam-deck-bundle.tar.gz": "PUBLIC_ARCHIVE_ASSET_ID",
          }
          def identifier(value, field):
              assert isinstance(value, int) and not isinstance(value, bool), field
              assert 0 < value <= UINT64_MAX, field
              return str(value)

          with open("release-public-assets.json", encoding="utf-8") as source:
              release = json.load(source)
          assert identifier(release["id"], "release id") == os.environ["RELEASE_ID"]
          assert release["tag_name"] == "steam-deck-latest"
          assert release["draft"] is False
          assert release["prerelease"] is True
          selected = {}
          for asset in release["assets"]:
              name = asset.get("name")
              if name in names:
                  assert name not in selected, f"duplicate public asset: {name}"
                  selected[name] = asset
          assert set(selected) == set(names)
          environment_lines = []
          for name, variable in names.items():
              asset = selected[name]
              asset_id = identifier(asset["id"], f"{name} id")
              asset_size = identifier(asset["size"], f"{name} size")
              expected_size = str(Path("release-assets", name).stat().st_size)
              assert asset_size == expected_size
              if name == "artemis-steam-deck.flatpak":
                  assert asset_id == os.environ["FLATPAK_ASSET_ID"]
                  assert asset_size == os.environ["FLATPAK_ASSET_SIZE"]
                  assert asset["updated_at"] == os.environ["FLATPAK_UPDATED_AT"]
              environment_lines.append(f"{variable}={asset_id}\n")
          with open("public-asset-ids.env", "w", encoding="utf-8") as output:
              output.writelines(environment_lines)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              output.writelines(environment_lines)
          PY

          # Values are safe to source because Python accepts only positive uint64 decimals.
          source public-asset-ids.env
          mkdir -p public-verified-assets
          verify_public_asset() {
            local name="$1"
            local asset_id="$2"
            local expected="release-assets/$name"
            local downloaded="public-verified-assets/$name"
            gh api --method GET \
              -H "Accept: application/octet-stream" \
              "repos/$GH_REPO/releases/assets/$asset_id" > "$downloaded"
            test "$(stat --format=%s "$downloaded")" = "$(stat --format=%s "$expected")"
            test "$(sha256sum "$downloaded" | awk '{print $1}')" = \
              "$(sha256sum "$expected" | awk '{print $1}')"
            cmp "$expected" "$downloaded"
          }
          verify_public_asset "artemis-steam-deck.flatpak" "$PUBLIC_FLATPAK_ASSET_ID"
          verify_public_asset "artemis-steam-deck-update.json" "$PUBLIC_MANIFEST_ASSET_ID"
          verify_public_asset "artemis-steam-deck.flatpak.sha256" "$PUBLIC_CHECKSUM_ASSET_ID"
          verify_public_asset "artemis-steam-deck-bundle.tar.gz" "$PUBLIC_ARCHIVE_ASSET_ID"

      - name: Reconfirm current main head and move rolling tag
        if: steps.initial-main-head.outputs.publish == 'true'
        run: |
          set -euo pipefail
          main_head="$(gh api "repos/$GH_REPO/git/ref/heads/main" --jq '.object.sha')"
          if [ "$main_head" != "$SOURCE_COMMIT" ]; then
            echo "Refusing to move rolling tag: main advanced to $main_head"
            exit 1
          fi

          preexisting_tag_ref_json="$(gh api "repos/$GH_REPO/git/ref/tags/steam-deck-latest")"
          preexisting_tag_object_type="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["type"])' <<< "$preexisting_tag_ref_json")"
          preexisting_tag_object_sha="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["sha"])' <<< "$preexisting_tag_ref_json")"
          validate_preexisting_tag_sha() {
            if [[ ! "$preexisting_tag_object_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Existing rolling tag contains an invalid object SHA"
              exit 1
            fi
          }
          validate_preexisting_tag_sha
          declare -A seen_preexisting_tag_objects=()
          preexisting_tag_depth=0
          while true; do
            case "$preexisting_tag_object_type" in
              commit)
                break
                ;;
              tag)
                if [[ -n "${seen_preexisting_tag_objects["$preexisting_tag_object_sha"]:-}" ]]; then
                  echo "Existing rolling tag contains a cycle at $preexisting_tag_object_sha"
                  exit 1
                fi
                seen_preexisting_tag_objects["$preexisting_tag_object_sha"]=1
                preexisting_tag_depth=$((preexisting_tag_depth + 1))
                if [ "$preexisting_tag_depth" -gt 32 ]; then
                  echo "Existing rolling tag exceeded the maximum dereference depth"
                  exit 1
                fi
                preexisting_tag_json="$(gh api "repos/$GH_REPO/git/tags/$preexisting_tag_object_sha")"
                preexisting_tag_object_type="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["type"])' <<< "$preexisting_tag_json")"
                preexisting_tag_object_sha="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["sha"])' <<< "$preexisting_tag_json")"
                validate_preexisting_tag_sha
                ;;
              *)
                echo "Unexpected existing rolling tag object type: $preexisting_tag_object_type"
                exit 1
                ;;
            esac
          done

          gh api --method PATCH "repos/$GH_REPO/git/refs/tags/steam-deck-latest" \
            -f sha="$SOURCE_COMMIT" \
            -F force=true

      - name: Verify final binding and publish final notes
        if: steps.initial-main-head.outputs.publish == 'true'
        run: |
          set -euo pipefail
          tag_ref_json="$(gh api "repos/$GH_REPO/git/ref/tags/steam-deck-latest")"
          tag_object_type="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["type"])' <<< "$tag_ref_json")"
          tag_object_sha="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["sha"])' <<< "$tag_ref_json")"
          validate_tag_sha() {
            if [[ ! "$tag_object_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Rolling tag contains an invalid object SHA"
              exit 1
            fi
          }
          validate_tag_sha
          declare -A seen_tag_objects=()
          tag_depth=0
          while true; do
            case "$tag_object_type" in
              commit)
                resolved_tag_commit="$tag_object_sha"
                break
                ;;
              tag)
                if [[ -n "${seen_tag_objects["$tag_object_sha"]:-}" ]]; then
                  echo "Rolling tag contains a cycle at $tag_object_sha"
                  exit 1
                fi
                seen_tag_objects["$tag_object_sha"]=1
                tag_depth=$((tag_depth + 1))
                if [ "$tag_depth" -gt 32 ]; then
                  echo "Rolling tag exceeded the maximum dereference depth"
                  exit 1
                fi
                tag_json="$(gh api "repos/$GH_REPO/git/tags/$tag_object_sha")"
                tag_object_type="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["type"])' <<< "$tag_json")"
                tag_object_sha="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["sha"])' <<< "$tag_json")"
                validate_tag_sha
                ;;
              *)
                echo "Unexpected rolling tag object type: $tag_object_type"
                exit 1
                ;;
            esac
          done
          test "$resolved_tag_commit" = "$SOURCE_COMMIT"

          gh api "repos/$GH_REPO/releases/tags/steam-deck-latest" \
            > final-public-release.json
          gh api --method GET \
            -H "Accept: application/octet-stream" \
            "repos/$GH_REPO/releases/assets/$PUBLIC_MANIFEST_ASSET_ID" \
            > final-public-manifest.json
          cmp release-assets/artemis-steam-deck-update.json \
            final-public-manifest.json
          export RESOLVED_TAG_COMMIT="$resolved_tag_commit"
          mapfile -t manifest_commits < <(python3 - <<'PY'
          import json
          import os

          with open("final-public-release.json", encoding="utf-8") as source:
              release = json.load(source)
          with open("final-public-manifest.json", encoding="utf-8") as source:
              manifest = json.load(source)
          assert str(release["id"]) == os.environ["RELEASE_ID"]
          assert release["tag_name"] == "steam-deck-latest"
          assert release["draft"] is False
          assert release["prerelease"] is True
          known_names = {
              "artemis-steam-deck.flatpak",
              "artemis-steam-deck-update.json",
              "artemis-steam-deck.flatpak.sha256",
              "artemis-steam-deck-bundle.tar.gz",
          }
          known_assets = [
              asset for asset in release["assets"]
              if asset["name"] in known_names
          ]
          assert len(known_assets) == 4
          assets = {asset["name"]: asset for asset in known_assets}
          assert len(assets) == 4
          flatpak = assets["artemis-steam-deck.flatpak"]
          assert str(flatpak["id"]) == os.environ["FLATPAK_ASSET_ID"]
          assert str(flatpak["size"]) == os.environ["FLATPAK_ASSET_SIZE"]
          assert flatpak["updated_at"] == os.environ["FLATPAK_UPDATED_AT"]
          assert str(assets["artemis-steam-deck-update.json"]["id"]) == \
              os.environ["PUBLIC_MANIFEST_ASSET_ID"]
          assert str(assets["artemis-steam-deck.flatpak.sha256"]["id"]) == \
              os.environ["PUBLIC_CHECKSUM_ASSET_ID"]
          assert str(assets["artemis-steam-deck-bundle.tar.gz"]["id"]) == \
              os.environ["PUBLIC_ARCHIVE_ASSET_ID"]
          assert manifest["schema"] == 1
          assert manifest["repository"] == "samelamin/vibertemis"
          assert manifest["application_id"] == "com.artemisdesktop.ArtemisDesktopDev"
          assert manifest["release_id"] == os.environ["RELEASE_ID"]
          assert manifest["build_sequence"] == os.environ["BUILD_SEQUENCE"]
          assert manifest["tag"] == "steam-deck-latest"
          assert manifest["flatpak"] == {
              "asset_id": os.environ["FLATPAK_ASSET_ID"],
              "name": "artemis-steam-deck.flatpak",
              "sha256": os.environ["EXPECTED_SHA"],
              "size": os.environ["FLATPAK_ASSET_SIZE"],
          }
          assert manifest["source_commit"] == os.environ["SOURCE_COMMIT"]
          assert manifest["tag_commit"] == os.environ["RESOLVED_TAG_COMMIT"]
          print(manifest["source_commit"])
          print(manifest["tag_commit"])
          PY
          )
          manifest_source_commit="${manifest_commits[0]}"
          manifest_tag_commit="${manifest_commits[1]}"
          test "$manifest_source_commit" = "$SOURCE_COMMIT"
          test "$manifest_tag_commit" = "$resolved_tag_commit"

          cat > release-notes.md <<EOF
          # Vibertemis Steam Deck rolling build

          - Version: \`$VERSION\`
          - Commit: \`$SOURCE_COMMIT\`
          - Workflow run: $RUN_URL
          - SHA-256: \`$EXPECTED_SHA\`

          The Flatpak and every companion were verified by exact GitHub asset ID. The manifest binds this release, rolling tag, Flatpak ID, byte size, publication time, and digest to the source commit.

          This rolling prerelease is replaced by every later successful build from main. Updaters reject any release/tag/manifest mismatch while replacement is in progress.
          EOF
          gh release edit steam-deck-latest \
            --title "Vibertemis Steam Deck rolling build ($VERSION)" \
            --notes-file release-notes.md \
            --prerelease

  build-raspberry-pi-dev:
    name: Raspberry Pi ARM64 Development Build
    needs: setup-version
    runs-on: ubuntu-22.04-arm
    if: needs.setup-version.outputs.should_build == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Display version info
      run: |
        echo "Using semantic version: ${{ needs.setup-version.outputs.version }}"
        echo "Using numeric version: ${{ needs.setup-version.outputs.numeric_version }}"
        echo "Is prerelease: ${{ needs.setup-version.outputs.is_prerelease }}"

    - name: Install ARM64 dependencies and Qt
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          qt6-base-dev qt6-base-dev-tools qt6-declarative-dev qt6-declarative-dev-tools libqt6svg6-dev \
          libegl1-mesa-dev libgl1-mesa-dev libopus-dev libsdl2-dev libsdl2-ttf-dev \
          libssl-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
          libva-dev libvdpau-dev libxkbcommon-dev wayland-protocols libdrm-dev nasm libgbm-dev \
          libfreetype6-dev libasound2-dev libdbus-1-dev libgles2-mesa-dev libglu1-mesa-dev \
          libibus-1.0-dev libpulse-dev libudev-dev libx11-dev libxcursor-dev libxext-dev \
          libxi-dev libxinerama-dev libxrandr-dev libxss-dev libxt-dev libxv-dev libxxf86vm-dev \
          libxcb-dri3-dev libx11-xcb-dev libplacebo-dev

    - name: Clean any existing build
      run: |
        rm -f .qmake.stash .qmake.cache
        find . -name "Makefile*" -delete || true

    - name: Build for Raspberry Pi ARM64
      run: |
        # Simple native ARM64 build - no cross-compilation needed!
        qmake6 artemis.pro CONFIG+=release "QMAKE_CXXFLAGS+=-fPIC"
        make -j$(nproc)

    - name: Verify ARM64 binary
      run: |
        echo "Verifying ARM64 binary:"
        file app/artemis
        readelf -h app/artemis | grep Machine || true

    - name: Create installation package
      env:
        SEMANTIC_VERSION: ${{ needs.setup-version.outputs.version }}
      run: |
        mkdir -p artemis-package
        cp app/artemis artemis-package/
        
        # Create simple install script
        cat > artemis-package/install.sh << 'EOF'
        #!/bin/bash
        echo "Installing Vibertemis for Raspberry Pi..."
        
        # Make binary executable
        chmod +x artemis
        
        # Copy to local bin directory
        mkdir -p ~/.local/bin
        cp artemis ~/.local/bin/
        
        # Create desktop entry
        mkdir -p ~/.local/share/applications
        cat > ~/.local/share/applications/artemis-desktop.desktop << 'EOD'
        [Desktop Entry]
        Type=Application
        Name=Vibertemis
        Comment=Game streaming client
        Exec=artemis
        Icon=artemis-desktop
        Categories=Game;Network;
        EOD
        
        echo "Installation complete!"
        echo "You can now run 'artemis' from terminal or find it in applications menu"
        EOF
        
        chmod +x artemis-package/install.sh
        
        # Create build info
        cat > artemis-package/build_info.txt << EOF
        Vibertemis Raspberry Pi ARM64 Build
        Version: $SEMANTIC_VERSION
        Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        Architecture: ARM64 (native build)
        Commit: ${{ github.sha }}
        Branch: ${{ github.ref_name }}
        
        Quick Start:
        1. Extract this archive
        2. Run: ./install.sh
        3. Launch from terminal: artemis
        EOF

        # Create the zip file
        cd artemis-package
        zip -r "../vibertemis-raspberry-pi-arm64-$SEMANTIC_VERSION.zip" .
        cd ..

    - name: Upload Raspberry Pi Development Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vibertemis-raspberry-pi-arm64-${{ needs.setup-version.outputs.version }}
        path: vibertemis-raspberry-pi-arm64-${{ needs.setup-version.outputs.version }}.zip
        retention-days: 30


  create-dev-release:
    name: Create Development Release
    needs: [setup-version, build-windows-x64-portable, build-windows-arm64-portable, build-windows-universal-installer, build-macos-dev, build-linux-dev, build-flatpak-dev, build-raspberry-pi-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.setup-version.outputs.should_build == 'true'  # Create releases for develop/main branches when builds ran
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for changelog
    
    - name: Display release version info
      run: |
        echo "Creating release with version: ${{ needs.setup-version.outputs.version }}"
        echo "Is prerelease: ${{ needs.setup-version.outputs.is_prerelease }}"

    - name: Create tag for release
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ needs.setup-version.outputs.version }}
        git push origin ${{ needs.setup-version.outputs.version }}

    - name: Generate Changelog
      id: changelog
      run: |
        CURRENT_VERSION="${{ needs.setup-version.outputs.version }}"
        PREV_TAG=$(git tag --sort=-creatordate | grep -v "$CURRENT_VERSION" | head -n1)
        if [ -z "$PREV_TAG" ]; then
          SINCE_DATE=$(date -d '7 days ago' '+%Y-%m-%d')
          echo "No previous release found. Getting commits since $SINCE_DATE"
          COMMITS=$(git log --since="$SINCE_DATE" --pretty=format:"%h|%s|%an|%ad" --date=short --no-merges)
        else
          echo "Getting commits since last release: $PREV_TAG"
          COMMITS=$(git log ${PREV_TAG}..$CURRENT_VERSION --pretty=format:"%h|%s|%an|%ad" --date=short --no-merges)
        fi
        FEATURES=""
        BUGFIXES=""
        IMPROVEMENTS=""
        OTHER=""
        while IFS='|' read -r hash subject author date; do
          if [ -z "$hash" ]; then continue; fi
          subject=$(echo "$subject" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if echo "$subject" | grep -iE "^(feat|feature|add|implement|new)[:|\s]" > /dev/null; then
            FEATURES="${FEATURES}- ${subject} (${hash})\n"
          elif echo "$subject" | grep -iE "^(fix|bug|resolve|correct)[:|\s]" > /dev/null; then
            BUGFIXES="${BUGFIXES}- ${subject} (${hash})\n"
          elif echo "$subject" | grep -iE "^(improve|enhance|update|optimize|refactor)[:|\s]" > /dev/null; then
            IMPROVEMENTS="${IMPROVEMENTS}- ${subject} (${hash})\n"
          else
            OTHER="${OTHER}- ${subject} (${hash})\n"
          fi
        done <<< "$COMMITS"
        CHANGELOG="## 🚧 Development Build Changelog\n\n"
        [ ! -z "$FEATURES" ] && CHANGELOG="${CHANGELOG}### ✨ New Features\n${FEATURES}\n"
        [ ! -z "$BUGFIXES" ] && CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n${BUGFIXES}\n"
        [ ! -z "$IMPROVEMENTS" ] && CHANGELOG="${CHANGELOG}### 🔧 Improvements\n${IMPROVEMENTS}\n"
        [ ! -z "$OTHER" ] && CHANGELOG="${CHANGELOG}### 📝 Other Changes\n${OTHER}\n"
        echo -e "$CHANGELOG" > changelog.md
       
        echo "Generated changelog:"
        cat changelog.md
        {
          echo 'changelog<<EOF'
          cat changelog.md
          echo EOF
        } >> $GITHUB_OUTPUT
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Check if artifacts exist (handle build skipping scenario)
      id: check-artifacts
      run: |
        if [ -d "artifacts" ] && [ "$(ls -A artifacts)" ]; then
          echo "artifacts_exist=true" >> $GITHUB_OUTPUT
          echo "Artifacts found - proceeding with release"
        else
          echo "artifacts_exist=false" >> $GITHUB_OUTPUT
          echo "No artifacts found - builds were skipped"
          echo "Will attempt to find and link to previous build with same commit"
          
          # Try to find a previous release with the same commit hash
          COMMIT_HASH="${{ github.sha }}"
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "Looking for existing artifacts with commit: $COMMIT_HASH"
        fi

    - name: Find and download previous artifacts if builds were skipped
     
      id: find-previous
      if: steps.check-artifacts.outputs.artifacts_exist == 'false'
      run: |
        echo "Searching for previous release with commit ${{ steps.check-artifacts.outputs.commit_hash }}"
        
        # Use GitHub API to find releases
        RELEASES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases?per_page=50")
        
        # Look for a release with matching commit (in tag or body)
        MATCHING_RELEASE=$(echo "$RELEASES" | jq -r '.[] | select(.body | contains("${{ steps.check-artifacts.outputs.commit_hash }}")) | .tag_name' | head -n1)
        
        if [ -n "$MATCHING_RELEASE" ] && [ "$MATCHING_RELEASE" != "null" ]; then
          echo "Found matching release: $MATCHING_RELEASE"
          echo "previous_release_tag=$MATCHING_RELEASE" >> $GITHUB_OUTPUT
          
          # Download assets from the matching release
          mkdir -p reused-artifacts
          RELEASE_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$MATCHING_RELEASE")
          
          # Download all assets
          echo "$RELEASE_INFO" | jq -r '.assets[].browser_download_url' | while read -r url; do
            if [ -n "$url" ]; then
              filename=$(basename "$url")
              echo "Downloading: $filename"
              curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o "reused-artifacts/$filename" "$url"
            fi
          done
          
          echo "reused_artifacts_available=true" >> $GITHUB_OUTPUT
          ls -la reused-artifacts/
        else
          echo "No matching release found with commit ${{ steps.check-artifacts.outputs.commit_hash }}"
          echo "reused_artifacts_available=false" >> $GITHUB_OUTPUT
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List downloaded files for debugging
      if: steps.check-artifacts.outputs.artifacts_exist == 'true'
      run: ls -R artifacts
      
    - name: List reused artifacts for debugging
      if: steps.check-artifacts.outputs.artifacts_exist == 'false'
      run: |
        if [ -d "reused-artifacts" ]; then
          echo "Reused artifacts found:"
          ls -la reused-artifacts/
        else
          echo "No reused artifacts available"
        fi
    
    - name: Create Development Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.setup-version.outputs.version }}
        name: "${{ (github.ref_name == 'main' || github.ref_name == 'master') && '🚀 Production Release' || '🚧 Development Build' }} ${{ needs.setup-version.outputs.version }}"
        body: |
          ${{ (github.ref_name == 'main' || github.ref_name == 'master') && '🚀 **Production Release** 🚀

          This is an official production release of Vibertemis.

          **✅ Stable**: This release has been tested and is recommended for general use.' || '🚧 **Development Build** 🚧
          
          This is an automated development build from the `develop` branch.
          
          **⚠️ Warning**: Development builds are unstable and intended for testing purposes only. Use at your own risk!' }}
          
          ---
          
          ${{ steps.changelog.outputs.changelog }}
          
          ---
          
          ## 📋 Build Information
          - **Version**: `${{ needs.setup-version.outputs.version }}`
          - **Numeric Version**: `${{ needs.setup-version.outputs.numeric_version }}`
          - **Branch**: `${{ github.ref_name }}`
          - **Commit**: `${{ github.sha }}`
          - **Build**: #${{ github.run_number }}
          
          ## 🔄 Installation
          ${{ (steps.check-artifacts.outputs.artifacts_exist == 'true' || steps.find-previous.outputs.reused_artifacts_available == 'true') && '1. Download the appropriate file for your platform
          2. Extract the archive (if applicable)
          3. Run the executable (may require additional setup on some platforms)' || 'No installation files are available for this release. Please check recent releases or feature branches for builds.' }}
        files: |
          artifacts/**/*.zip
          artifacts/**/*.exe
          artifacts/**/*.dmg
          artifacts/**/*.tar.gz
          artifacts/**/*.AppImage
          artifacts/**/*.flatpak
          artifacts/**/artemis
          artifacts/**/build_info.txt
          artifacts/**/install.sh
        prerelease: ${{ needs.setup-version.outputs.is_prerelease }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
